version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tahsilat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tahsilat_paneli
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tahsilat_paneli"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
